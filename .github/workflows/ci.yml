name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Public-safety scan runs BEFORE dependency installation.
      - name: Public-safety scan
        run: node scripts/public-safety.mjs

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Security tests
        run: npm run test:safety

      - name: Build
        run: npm run build

      - name: Manifest audit
        run: npm run audit:manifest

      - name: Network-usage audit
        run: npm run audit:network

      - name: Distribution audit
        run: npm run audit:dist
